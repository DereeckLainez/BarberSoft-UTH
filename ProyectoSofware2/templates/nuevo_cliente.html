<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Cliente - BarberSoft Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-hover: #a38445;
            --text-readable: #e0e0e0; /* Blanco hueso para máxima lectura */
            --placeholder-color: #b0b0b0; /* Gris plata claro para el placeholder */
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.9)), 
                        url('https://images.unsplash.com/photo-1593702275687-f8b402bf1fb5?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            margin: 0;
        }

        .form-card {
            background: rgba(15, 15, 15, 0.98);
            border: 1px solid rgba(197, 160, 89, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .form-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .sub-label {
            color: var(--text-readable);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }

        .form-label {
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 0;
            color: white; /* Color del texto que escribe el usuario */
            padding: 12px;
            margin-bottom: 20px;
        }

        /* --- CORRECCIÓN: PLACEHOLDER BRILLANTE --- */
        .form-control::placeholder {
            color: var(--placeholder-color) !important;
            opacity: 1; /* Necesario para que el color se aplique bien */
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--gold);
            box-shadow: none;
            color: white;
        }

        .btn-save {
            background-color: var(--gold);
            color: black;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0;
            border: none;
            padding: 15px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: var(--gold-hover);
            color: white;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--text-readable);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="form-card shadow-lg text-center">
        <div class="form-header">
            <h2>Nuevo Caballero</h2>
            <span class="sub-label">Registro de Membresía Oficial</span>
        </div>

        <form method="POST">
            <div class="text-start">
                <label class="form-label">Nombre Completo</label>
                <input type="text" name="nombre_completo" class="form-control" placeholder="Ej: Juan Pérez" required>
                
                <label class="form-label">Teléfono de Contacto</label>
                <input type="text" name="telefono" class="form-control" placeholder="9999-9999">
                
                <label class="form-label">Correo Electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="cliente@correo.com" required>
                
                <label class="form-label">Contraseña de Acceso</label>
                <input type="password" name="contraseña" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-save">Guardar Registro</button>
            <a href="/clientes" class="back-link">← Cancelar y Volver al Menú</a>
        </form>
    </div>

</body>
</html>
