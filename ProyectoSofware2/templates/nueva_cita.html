<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Cita - BarberSoft Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========================================
           VARIABLES CSS - PALETA DE COLORES BARBERSOFT
           ======================================== */
        :root {
            --barber-gold: #c5a059;          /* Color dorado principal */
            --gold-hover: #a38445;            /* Color dorado para hover */
            --gold-light: #d4b575;            /* Color dorado claro */
            --bg-dark: #0a0a0a;               /* Fondo oscuro base */
            --bg-card: rgba(15, 15, 15, 0.95); /* Fondo de tarjetas */
            --text-main: #e0e0e0;            /* Color de texto principal */
            --text-muted: #9e9e9e;            /* Color de texto secundario */
            --text-muted-premium: #b0b0b0;     /* Color de texto premium */
            --success-green: #28a745;          /* Color de éxito */
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Transición suave */
        }

        /* ========================================
           RESET CSS - LIMPIEZA DE ESTILOS
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========================================
           ESTILOS DEL BODY - FONDO Y TIPOGRAFÍA
           ======================================== */
        body { 
            /* Fondo con múltiples capas: gradientes + imagen */
            background: 
                radial-gradient(circle at 20% 50%, rgba(197, 160, 89, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 0, 0, 0.3) 0%, transparent 50%),
                linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(10, 10, 10, 0.95) 100%),
                url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Roboto', sans-serif; color: var(--text-main); overflow-x: hidden;
            min-height: 100vh;
            padding-top: 80px; /* Espacio para navbar fija */
        }

        /* ========================================
           PARTÍCULAS ANIMADAS - EFECTO VISUAL DINÁMICO
           ======================================== */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 1;
        }

        .particle {
            position: absolute; width: 3px; height: 3px; background: var(--barber-gold);
            border-radius: 50%; opacity: 0.4; animation: float 20s infinite ease-in-out;
        }

        /* Animación de flotación para partículas */
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }      /* Posición inicial y final */
            33% { transform: translateY(-40px) translateX(30px); }    /* Movimiento hacia arriba y derecha */
            66% { transform: translateY(30px) translateX(-30px); }     /* Movimiento hacia abajo y izquierda */
        }

        /* ========================================
           BARRA DE NAVEGACIÓN - NAVBAR FIJA Y ESTILIZADA
           ======================================== */
        .navbar { 
            background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(15,15,15,0.98) 100%) !important;
            border-bottom: 2px solid rgba(197, 160, 89, 0.4); 
            padding: 20px 0; backdrop-filter: blur(20px); z-index: 1000;
            position: fixed; top: 0; left: 0; right: 0; width: 100%;
        }
        
        /* Marca/Logo de la aplicación */
        .navbar-brand { 
            font-family: 'Playfair Display', serif; color: var(--barber-gold) !important; 
            font-size: 2rem; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }
        .navbar-brand:hover { color: var(--gold-light) !important; transform: scale(1.05); }
        
        /* Botón de volver al panel */
        .btn-back { 
            border: 1px solid rgba(197, 160, 89, 0.3); color: var(--barber-gold); 
            border-radius: 8px; text-transform: uppercase; font-size: 0.8rem; 
            padding: 10px 24px; transition: var(--transition-smooth); text-decoration: none;
            background: rgba(197, 160, 89, 0.05);
        }
        .btn-back:hover { 
            border-color: var(--barber-gold); color: #000; background: var(--barber-gold);
            transform: translateY(-2px); box-shadow: 0 8px 25px rgba(197, 160, 89, 0.3);
        }

        /* ========================================
           CONTENEDOR PRINCIPAL DEL FORMULARIO
           ======================================== */
        .form-container {
            background: var(--bg-card); border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 20px; padding: 50px; margin: 20px auto;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            animation: fadeIn 1s ease-out 0.5s both; position: relative; overflow: hidden;
            max-width: 650px; width: 100%;
            display: block; /* Asegurar que esté centrado */
        }
        
        /* Efecto de borde brillante al hover */
        .form-container::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--barber-gold), transparent, var(--barber-gold));
            border-radius: 20px; opacity: 0; transition: var(--transition-smooth); z-index: -1;
        }
        .form-container:hover::before { opacity: 0.3; }

        /* ========================================
           ENCABEZADO DEL FORMULARIO
           ======================================== */
        .form-header {
            text-align: center; margin-bottom: 40px;
        }
        
        /* Título principal */
        .form-header h2 { 
            font-family: 'Playfair Display', serif; color: var(--barber-gold); 
            font-size: 2.5rem; text-transform: uppercase; letter-spacing: 3px;
            margin-bottom: 15px; animation: fadeInDown 1s ease-out;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        /* Subtítulo descriptivo */
        .form-subtitle {
            color: var(--text-muted-premium); text-transform: uppercase; 
            letter-spacing: 2px; font-size: 0.9rem; font-weight: 600;
            border-top: 2px solid rgba(197, 160, 89, 0.3); 
            display: inline-block; padding-top: 10px; animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* ========================================
           ANIMACIONES DE ENTRADA
           ======================================== */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* ========================================
           CAMPOS DEL FORMULARIO - INPUTS Y SELECTS
           ======================================== */
        .form-group {
            margin-bottom: 25px; position: relative;
        }

        /* Etiquetas de los campos */
        .form-label {
            color: var(--barber-gold); font-weight: 700; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 1.5px; margin-bottom: 10px;
            display: block; animation: slideInLeft 0.8s ease-out;
        }

        /* Estilos para inputs y selects */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 12px; color: var(--text-main); padding: 15px 20px 15px 50px;
            width: 100%; transition: var(--transition-smooth); font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        /* Efecto al hacer focus en los campos */
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08); border-color: var(--barber-gold);
            outline: none; box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
            transform: translateY(-2px);
        }

        /* Estilo para placeholders */
        .form-control::placeholder {
            color: var(--text-muted); opacity: 0.7;
        }

        /* ========================================
           OPCIONES DE SELECTS - MENÚS DESPLEGABLES
           ======================================== */
        .form-select option {
            background: var(--bg-dark); color: var(--text-main);
            padding: 10px;
        }

        /* ========================================
           ICONOS DENTRO DE LOS CAMPOS
           ======================================== */
        .input-icon {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: var(--barber-gold); font-size: 1.1rem; z-index: 10;
            transition: var(--transition-smooth);
        }

        /* Cambio de color de icono al focus */
        .form-control:focus + .input-icon,
        .form-select:focus + .input-icon {
            color: var(--gold-light);
        }

        /* ========================================
           BOTONES DE ACCIÓN - ENVIAR Y CANCELAR
           ======================================== */
        .form-actions {
            display: flex; gap: 15px; margin-top: 30px;
        }

        /* Botón principal de envío */
        .btn-gold { 
            background: linear-gradient(135deg, var(--barber-gold) 0%, var(--gold-hover) 100%);
            color: #000; font-weight: 700; text-transform: uppercase; 
            border: none; border-radius: 12px; padding: 18px 35px; 
            transition: var(--transition-smooth); text-decoration: none; display: inline-flex;
            align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(197, 160, 89, 0.4);
            font-size: 1rem; letter-spacing: 1px; flex: 1;
            justify-content: center;
        }

        /* Efecto hover del botón principal */
        .btn-gold:hover { 
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--barber-gold) 100%);
            color: #000; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(197, 160, 89, 0.5);
        }

        /* Botón secundario de cancelar */
        .btn-secondary {
            background: transparent; color: var(--text-muted); 
            font-weight: 600; text-transform: uppercase; 
            border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 12px; 
            padding: 18px 35px; transition: var(--transition-smooth); text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px; font-size: 0.9rem;
        }

        /* Efecto hover del botón secundario */
        .btn-secondary:hover {
            background: rgba(197, 160, 89, 0.1); color: var(--barber-gold);
            transform: translateY(-2px);
        }

        /* ========================================
           MENÚ HAMBURGUESA - ESTILOS Y ANIMACIONES
           ======================================== */
        .navbar-toggler {
            border: 1px solid rgba(197, 160, 89, 0.3);
            background: rgba(197, 160, 89, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            transition: var(--transition-smooth);
        }

        .navbar-toggler:hover {
            border-color: var(--barber-gold);
            background: rgba(197, 160, 89, 0.2);
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
            border-color: var(--barber-gold);
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(197, 160, 89, 0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
            width: 24px;
            height: 24px;
        }

        .navbar-toggler-icon:hover {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23c5a059' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        /* ========================================
           ANIMACIONES ADICIONALES
           ======================================== */
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ========================================
           DISEÑO RESPONSIVO - ADAPTACIÓN A DISPOSITIVOS MÓVILES
           ======================================== */
        @media (max-width: 768px) {
            body { padding-top: 150px; } /* Más espacio para navbar en móviles */
            .form-container { padding: 30px 20px; margin: 10px; }
            .form-header h2 { font-size: 2rem; }
            .form-actions { flex-direction: column; }
            .btn-gold, .btn-secondary { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- ========================================
         CONTENEDOR DE PARTÍCULAS ANIMADAS
         ======================================== -->
    <div class="particles">
        <div class="particle" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 20%; left: 85%; animation-delay: 2s;"></div>
        <div class="particle" style="top: 60%; left: 5%; animation-delay: 4s;"></div>
        <div class="particle" style="top: 80%; left: 75%; animation-delay: 6s;"></div>
        <div class="particle" style="top: 30%; left: 45%; animation-delay: 8s;"></div>
        <div class="particle" style="top: 70%; left: 25%; animation-delay: 10s;"></div>
        <div class="particle" style="top: 45%; left: 65%; animation-delay: 12s;"></div>
    </div>

    <!-- ========================================
         BARRA DE NAVEGACIÓN PRINCIPAL
         ======================================== -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-cut me-2"></i>BarberSoft
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link btn-back" href="/citas">
                        <i class="fas fa-arrow-left me-2"></i>Volver al Panel
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========================================
         CONTENEDOR PRINCIPAL DEL FORMULARIO
         ======================================== -->
    <div class="form-container">
        <div class="form-header">
            <h2>Nueva Cita</h2>
            <p class="form-subtitle">Agendar Servicio Premium</p>
        </div>

        <!-- ========================================
             FORMULARIO DE CREACIÓN DE CITA
             ======================================== -->
        <form method="POST">
            <!-- Campo: Selección de Cliente -->
            <div class="form-group">
                <label class="form-label">Seleccionar Cliente</label>
                <div class="position-relative">
                    <i class="fas fa-user input-icon"></i>
                    <select name="id_cliente" class="form-select" required>
                        <option value="" disabled selected>Seleccionar Cliente</option>
                        {% for c in clientes %}
                        <option value="{{ c.id_cliente }}">{{ c.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Campo: Selección de Barbero -->
            <div class="form-group">
                <label class="form-label">Seleccionar Barbero</label>
                <div class="position-relative">
                    <i class="fas fa-user-tie input-icon"></i>
                    <select name="id_barbero" class="form-select" required>
                        <option value="" disabled selected>Seleccionar Barbero</option>
                        {% for b in barberos %}
                        <option value="{{ b.id_barbero }}">{{ b.nombre_barbero }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Campo: Tipo de Servicio -->
            <div class="form-group">
                <label class="form-label">Tipo de Servicio</label>
                <div class="position-relative">
                    <i class="fas fa-cut input-icon"></i>
                    <select name="id_servicio" class="form-select" required>
                        <option value="" disabled selected>Seleccionar Servicio</option>
                        {% for s in servicios %}
                        <option value="{{ s.id_servicio }}">{{ s.nombre_servicio }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Campo: Fecha y Hora -->
            <div class="form-group">
                <label class="form-label">Fecha y Hora</label>
                <div class="position-relative">
                    <i class="fas fa-calendar-alt input-icon"></i>
                    <input type="datetime-local" name="fecha_hora" class="form-control" required>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="form-actions">
                <button type="submit" class="btn-gold">
                    <i class="fas fa-calendar-check"></i>
                    Confirmar Cita
                </button>
                <a href="/citas" class="btn-secondary">
                    <i class="fas fa-times"></i>
                    Cancelar
                </a>
            </div>
        </form>
    </div>

    <!-- ========================================
         LIBRERÍAS JAVASCRIPT
         ======================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ========================================
         SCRIPTS PERSONALIZADOS - ANIMACIONES Y EFECTOS
         ======================================== -->
    <script>
        // ========================================
        //  EFECTO DE PARTÍCULAS DINÁMICAS
        //  Movimiento aleatorio de partículas en el fondo
        // ========================================
        document.addEventListener('DOMContentLoaded', function() {
            const particles = document.querySelectorAll('.particle');
            particles.forEach(particle => {
                setInterval(() => {
                    const randomX = Math.random() * 100;
                    const randomY = Math.random() * 100;
                    particle.style.left = randomX + '%';
                    particle.style.top = randomY + '%';
                }, 8000 + Math.random() * 8000);
            });
        });

        // ========================================
        //  ANIMACIÓN DE ENTRADA PARA EL FORMULARIO
        //  Efecto fade-in y deslizamiento hacia arriba
        // ========================================
        const formContainer = document.querySelector('.form-container');
        formContainer.style.opacity = '0';
        formContainer.style.transform = 'translateY(30px)';
        
        setTimeout(() => {
            formContainer.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            formContainer.style.opacity = '1';
            formContainer.style.transform = 'translateY(0)';
        }, 300);

        // ========================================
        //  EFECTO DE FOCUS MEJORADO EN CAMPOS
        //  Escala ligera al hacer focus en inputs y selects
        // ========================================
        const formControls = document.querySelectorAll('.form-control, .form-select');
        formControls.forEach(control => {
            control.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            control.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
