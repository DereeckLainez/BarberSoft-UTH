<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Factura - BarberSoft Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-hover: #a38445;
            --text-readable: #e0e0e0;
            --placeholder-color: #f8f9fa; /* Blanco brillante para lectura */
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.9)), 
                        url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070');
            background-size: cover; background-position: center; background-attachment: fixed;
            height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Roboto', sans-serif;
        }

        .form-card { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(197, 160, 89, 0.3); padding: 40px; width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .form-header h2 { font-family: 'Playfair Display', serif; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .sub-label { color: var(--text-readable); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 30px; text-align: center; }
        .form-label { color: var(--gold); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; }
        
        .form-select, .form-control { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #444; 
            border-radius: 0; 
            color: white; 
            padding: 12px; 
            margin-bottom: 20px; 
        }

        /* CORRECCIÓN: PLACEHOLDERS BRILLANTES */
        .form-control::placeholder { color: var(--placeholder-color) !important; opacity: 1; }
        option { background-color: #111; color: white; }

        .btn-save { background-color: var(--gold); color: black; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; border-radius: 0; border: none; padding: 15px; width: 100%; transition: 0.3s; }
        .btn-save:hover { background-color: var(--gold-hover); color: white; }
        .back-link { display: block; margin-top: 20px; color: var(--text-readable); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

    <div class="form-card shadow-lg">
        <div class="form-header text-center">
            <h2>Generar Cobro</h2>
            <span class="sub-label">Registro de Venta Oficial</span>
        </div>

        <form method="POST">
            <div class="text-start">
                <label class="form-label">Seleccionar Cliente</label>
                <select name="id_cliente" class="form-select" required>
                    <option value="" disabled selected>— Elegir Cliente —</option>
                    {% for c in clientes %}
                    <option value="{{ c.id_cliente }}">{{ c.nombre_completo }}</option>
                    {% endfor %}
                </select>

                <label class="form-label">Servicio Realizado</label>
                <select name="id_servicio" class="form-select" required>
                    <option value="" disabled selected>— Elegir Servicio —</option>
                    {% for s in servicios %}
                    <option value="{{ s.id_servicio }}">{{ s.nombre_servicio }} (L. {{ s.precio }})</option>
                    {% endfor %}
                </select>

                <label class="form-label">Total a Pagar (L.)</label>
                <input type="number" step="0.01" name="total_pagar" class="form-control" placeholder="Ingrese el monto final" required>
            </div>

            <button type="submit" class="btn-save">Finalizar Transacción</button>
            <a href="/facturas" class="back-link">← Cancelar y Volver</a>
        </form>
    </div>

</body>
</html>
