<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Inventario - BarberSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid"><a class="navbar-brand" href="/dashboard">BarberSoft</a></div>
    </nav>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Inventario de Productos</h2>
            <a href="/nuevo_producto" class="btn btn-success">+ Nuevo Producto</a>
        </div>
        <table class="table table-striped card shadow-sm">
            <thead class="table-dark">
                <tr><th>ID</th><th>Producto</th><th>Precio</th><th>Stock</th></tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr><td>{{ p.id_producto }}</td><td>{{ p.nombre_producto }}</td><td>L. {{ p.precio_venta }}</td><td>{{ p.stock }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
