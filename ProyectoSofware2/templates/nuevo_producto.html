<div class="container mt-5">
    <h3>Registrar Producto</h3>
    <form method="POST" class="card p-4">
        <input type="text" name="nombre_producto" placeholder="Nombre" class="form-control mb-2" required>
        <input type="number" step="0.01" name="precio_venta" placeholder="Precio" class="form-control mb-2" required>
        <input type="number" name="stock" placeholder="Cantidad en Stock" class="form-control mb-2" required>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
</div>
